  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  html, body{
    margin:0;
    padding:0;
    font-family:"Outfit", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:#fff;
    color:#0e1116;
  }

  :root{

    --container:1120px;
    --hbH:74px;

    --muted:rgba(14,17,22,.70);
    --border:rgba(10,16,26,.10);

    --radius:16px;
    --shadow: 0 22px 60px rgba(10,16,26,.10);
    --shadow2: 0 12px 32px rgba(10,16,26,.07);
  }

  #MainContent{
    min-height: calc(100vh - var(--hbH));
    display:flex;
    flex-direction:column;
    width:100%;
  }

  .Page{
    flex:1;
    width:100%;
    max-width:var(--container);
    margin:0 auto;
    padding:44px 18px 78px;
    box-sizing:border-box;
  }

  /* ===== Typography schlank ===== */

  .Title{
    margin:0;
    font-size: clamp(34px, 4.2vw, 54px);
    font-weight:300;              /* war 950 */
    letter-spacing:0.004em;
    line-height:1.05;
  }

  .Rule{
    height:3px;
    width:56px;
    background: var(--purple);
    border-radius:2px;
    margin:14px 0 0;
    opacity:.9;
  }

  .Sub{
    margin:14px 0 0;
    color:var(--muted);
    font-size:16.6px;
    line-height:1.65;
    max-width:78ch;
    font-weight:400;              /* war 650 */
  }

  /* ===== Grid ===== */

  .Grid{
    margin-top:30px;
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap:18px;
    align-items:stretch;
  }

  .Release{
    border:1px solid var(--border);
    border-radius:var(--radius);
    background:#fff;
    overflow:hidden;
    display:flex;
    flex-direction:column;
    min-width:0;
    box-shadow:var(--shadow2);
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }

  .Release:hover{
    transform:translateY(-3px);
    box-shadow:var(--shadow);
    border-color: rgba(104,0,104,.16);
  }

  .Cover{
    background: rgba(10,16,26,.02);
    border-bottom:1px solid rgba(10,16,26,.06);
    aspect-ratio: 1 / 1;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .Cover img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }

  .Body{
    padding:16px 16px 16px;
    display:flex;
    flex-direction:column;
    gap:12px;
    flex:1;
  }

  .MetaTop{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
  }

  .Badge{
    font-weight:500;             /* war 950 */
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: rgba(14,17,22,.65);
  }

  .Date{
    font-weight:400;             /* war 900 */
    font-size:12px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color: rgba(14,17,22,.45);
  }

  .Name{
    margin:0;
    font-size:19px;
    font-weight:500;             /* war 950 */
    letter-spacing:-0.004em;
    line-height:1.2;
  }

  .Desc{
    margin:0;
    color: rgba(14,17,22,.82);
    font-size:15.8px;
    line-height:1.7;
    font-weight:400;             /* war 650 */
  }

  /* ===== Icon Links ===== */

  .IconLinks{
    margin-top:auto;
    display:flex;
    gap:10px;
    padding-top:10px;
    flex-wrap:wrap;
  }

  .IconBtn{
    width:44px;
    height:44px;
    border-radius:14px;

    display:inline-flex;
    align-items:center;
    justify-content:center;

    border:1px solid rgba(10,16,26,.12);
    background: rgba(10,16,26,.02);

    color: rgba(14,17,22,.80);
    text-decoration:none;

    transition: transform .15s ease,
                background .15s ease,
                border-color .15s ease,
                color .15s ease;
  }

  .IconBtn:hover{
    transform:translateY(-2px);
    background: rgba(104,0,104,.06);
    border-color: rgba(104,0,104,.22);
    color: var(--purpleDark);
  }

  .IconBtn svg{
    width:20px;
    height:20px;
    display:block;
  }

  .Empty{
    margin-top:22px;
    border:1px dashed rgba(10,16,26,.18);
    border-radius:var(--radius);
    padding:16px;
    color:var(--muted);
    background: rgba(10,16,26,.02);
    max-width:860px;
    font-weight:400;             /* war 650 */
  }

  @media (max-width:1020px){
    .Grid{ grid-template-columns: repeat(2, 1fr); }
  }

  @media (max-width:680px){
    .Grid{ grid-template-columns: 1fr; }
  }

  .sr-only{
    position:absolute !important;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0);
    white-space:nowrap; border:0;
  }
</style>
</head>
