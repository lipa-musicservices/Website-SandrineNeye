<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="./">

  <title>Releases – Sandrine Neye</title>
  <meta name="description" content="Releases von Sandrine Neye – Singles, EPs, Alben." />

  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Root assets (2 Ebenen hoch) -->
  <link rel="icon" href="../Resources/Content/Favicon.ico" />
  <link rel="stylesheet" href="../style.css" />
  <script defer src="../Scripts/includes.js"></script>
  <script defer src="../Scripts/main.js"></script>

<style>
  html, body{
    margin:0;
    padding:0;
    font-family:"Outfit", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background:#fff;
    color:#0e1116;
  }

  :root{
    --container:1120px;
    --hbH:74px;

    --muted:rgba(14,17,22,.70);
    --border:rgba(10,16,26,.10);

    --radius:16px;
  }

  #MainContent{
    min-height: calc(100vh - var(--hbH));
    display:flex;
    flex-direction:column;
    width:100%;
  }

  .Page{
    flex:1;
    width:100%;
    max-width:var(--container);
    margin:0 auto;
    padding:44px 18px 78px;
    box-sizing:border-box;
  }

  /* ===== Typography ===== */
  .Title{
    margin:0;
    font-size: clamp(34px, 4.2vw, 54px);
    font-weight:300;
    letter-spacing:0.004em;
    line-height:1.05;
  }

  .Rule{
    height:3px;
    width:56px;
    background: var(--purple);
    border-radius:2px;
    margin:14px 0 0;
    opacity:.9;
  }

  .Sub{
    margin:14px 0 0;
    color:var(--muted);
    font-size:16.6px;
    line-height:1.65;
    max-width:78ch;
    font-weight:400;
  }

  /* =========================================================
     RELEASE LIST
     - noch größere Cover
     - ohne Ecken
     - Listenoptik mit Strichen bleibt
     ========================================================= */
  .List{
    margin-top:32px;
    display:flex;
    flex-direction:column;
  }

  .Row{
    display:flex;
    gap:34px;
    align-items:center;
    padding:30px 0;
    border-bottom:1px solid rgba(10,16,26,.08);
  }

  .Row:first-child{
    border-top:1px solid rgba(10,16,26,.08);
  }

  .CoverSq{
    width:260px;
    height:260px;
    flex:0 0 auto;
    background: rgba(10,16,26,.03);
    overflow:hidden;
    border-radius:0;
    border:1px solid rgba(10,16,26,.08);
  }

  .CoverSq img{
    width:100%;
    height:100%;
    display:block;
    object-fit:cover;
  }

  .Info{
    min-width:0;
    flex:1;
    display:flex;
    flex-direction:column;
    gap:10px;
  }

  .Name{
    margin:0;
    font-size:30px;
    font-weight:600;
    letter-spacing:-0.01em;
    line-height:1.14;
  }

  .Meta{
    display:flex;
    gap:12px;
    align-items:center;
    flex-wrap:wrap;
    color: rgba(14,17,22,.55);
    font-size:12.5px;
    letter-spacing:.10em;
    text-transform:uppercase;
  }

  .Badge{
    font-weight:650;
    color: rgba(14,17,22,.62);
  }

  .Date{
    font-weight:600;
    color: rgba(14,17,22,.45);
  }

  /* Icons */
  .Links{
    flex:0 0 auto;
    display:flex;
    gap:10px;
    align-items:center;
    flex-wrap:wrap;
  }

  .IconLink{
    width:46px;
    height:46px;
    border-radius:12px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    border:1px solid rgba(10,16,26,.12);
    background: rgba(10,16,26,.05);
    text-decoration:none;
    transition: transform .15s ease, background .15s ease, border-color .15s ease;
  }

  .IconLink:hover{
    transform: translateY(-2px);
    background: rgba(104,0,104,.06);
    border-color: rgba(104,0,104,.22);
  }

  .IconLink img{
    width:22px;
    height:22px;
    display:block;
    object-fit:contain;
    image-rendering:auto;
  }

  .Empty{
    margin-top:22px;
    border:1px dashed rgba(10,16,26,.18);
    border-radius:var(--radius);
    padding:16px;
    color:var(--muted);
    background: rgba(10,16,26,.02);
    max-width:860px;
    font-weight:400;
  }

  @media (max-width:1100px){
    .CoverSq{
      width:220px;
      height:220px;
    }

    .Name{
      font-size:26px;
    }

    .Row{
      gap:26px;
    }
  }

  @media (max-width:820px){
    .CoverSq{
      width:170px;
      height:170px;
    }

    .Name{
      font-size:22px;
    }

    .Row{
      gap:18px;
      padding:22px 0;
    }

    .IconLink{
      width:42px;
      height:42px;
    }

    .IconLink img{
      width:20px;
      height:20px;
    }
  }

  @media (max-width:560px){
    .Row{
      display:grid;
      grid-template-columns: 170px minmax(0,1fr);
      gap:14px;
      align-items:start;
    }

    .CoverSq{
      width:170px;
      height:170px;
      grid-row:1 / span 2;
    }

    .Info{
      gap:6px;
    }

    .Links{
      margin-top:2px;
    }

    .Name{
      font-size:19px;
    }
  }

  .sr-only{
    position:absolute !important;
    width:1px; height:1px;
    padding:0; margin:-1px;
    overflow:hidden; clip:rect(0,0,0,0);
    white-space:nowrap; border:0;
  }
</style>
</head>

<body>
  <div id="HeadbarSlot"></div>

            </a>

            <a class="IconLink" href="https://music.apple.com/de/album/dreaming-like-flying-ep/1629703552" target="_blank" rel="noopener" aria-label="Apple Music öffnen">

            </a>

            <a class="IconLink" href="https://music.youtube.com/playlist?list=OLAK5uy_m-SsyOI0589-99zwvwE0vw9e9MLJRpd60&si=wEJCamWbey7PgxkQ" target="_blank" rel="noopener" aria-label="YouTube Music öffnen">
              <span class="sr-only">YouTube Music</span>
              <img src="../Resources/Pictograms/YT_6a2f86.png" alt="" aria-hidden="true">

        </article>

      </section>

      <div class="Empty" style="display:none" id="EmptyHint">
        Noch keine Releases eingetragen.
      </div>

    </div>
  </main>

  <div id="FootbarSlot"></div>
  <div id="CookieSlot"></div>

  <noscript>
    <div style="padding:16px; max-width:900px; margin:0 auto;">

</body>
