<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="./">

  <title>Konzerte – Sandrine Neye</title>
  <meta name="description" content="Kommende und vergangene Konzerte von Sandrine Neye." />

  <!-- Google Font: Outfit -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="icon" href="../Resources/Content/Favicon.ico" />
  <link rel="stylesheet" href="../style.css" />
  <script defer src="../Scripts/includes.js"></script>
  <script defer src="../Scripts/main.js"></script>

  <style>
    html, body{
      margin:0;
      padding:0;
      font-family:"Outfit", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#fff;
      color:#0e1116;
    }

    :root{
      --container:1120px;
      --muted:rgba(14,17,22,.70);
      --muted2:rgba(14,17,22,.56);
      --border:rgba(10,16,26,.14);
      --radius:14px;
      --line:rgba(10,16,26,.16);
    }

    .Page{
      max-width:var(--container);
      margin:0 auto;
      padding:42px 18px 70px;
      min-height:60vh;
      box-sizing:border-box;
    }

    .Page__head{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      flex-wrap:wrap;
      margin-bottom:22px;
    }

    .Page__title{
      margin:0;
      font-size:clamp(32px, 4.2vw, 52px);
      font-weight:300;
      letter-spacing:0.004em;
      line-height:1.04;
    }

    .AccentRule{
      height:3px;
      width:56px;
      background:var(--purple);
      border-radius:2px;
      margin-top:14px;
      opacity:.9;
    }

    .Page__subtitle{
      margin:10px 0 0;
      color:var(--muted);
      font-size:16.5px;
      line-height:1.65;
      max-width:70ch;
      font-weight:400;
    }

    .SectionTitle{
      margin:34px 0 14px;
      font-size:13px;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(14,17,22,.62);
    }

    /* =========================
       LIST LAYOUT (Ira Diehr style)
       ========================= */
    .GigList{
      border-top:1px solid var(--line);
    }

    .GigRow{
      display:grid;
      grid-template-columns: 160px 1fr 140px;
      gap:18px;
      align-items:center;

      padding:22px 0;
      border-bottom:1px solid var(--line);
    }

    /* Date block: big day + small month */
    .GigDate{
      display:flex;
      align-items:flex-start;
      gap:10px;
      user-select:none;
      white-space:nowrap;
    }

    .GigDate__day{
      font-size:64px;
      line-height:0.9;
      font-weight:600;
      letter-spacing:-0.04em;
      color:rgba(14,17,22,.18);
      min-width:74px;
      text-align:right;
    }

    .GigDate__stack{
      padding-top:14px;
      display:flex;
      flex-direction:column;
      gap:6px;
    }

    .GigDate__month{
      font-size:12px;
      font-weight:700;
      letter-spacing:.14em;
      text-transform:uppercase;
      color:rgba(14,17,22,.62);
    }

    .GigDate__year{
      font-size:12px;
      font-weight:650;
      letter-spacing:.06em;
      color:rgba(14,17,22,.48);
    }

    .GigMain{
      min-width:0;
    }

    .GigTitle{
      margin:0;
      font-weight:700;
      font-size:13px;
      letter-spacing:.08em;
      text-transform:uppercase;
      color:rgba(14,17,22,.70);
    }

    .GigMeta{
      margin:8px 0 0;
      color:rgba(14,17,22,.78);
      font-weight:500;
      font-size:13px;
      line-height:1.5;
      letter-spacing:.02em;
    }

    .GigMeta small{
      color:var(--muted2);
      font-weight:500;
    }

    .GigActions{
      display:flex;
      justify-content:flex-end;
      align-items:center;
    }

    .GigLink{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      height:40px;
      padding:0 14px;
      border-radius:10px;
      text-decoration:none;

      font-weight:750;
      letter-spacing:.10em;
      text-transform:uppercase;
      font-size:12px;

      border: 0px solid var(--purple);
      color:var(--purple);
      background:transparent;

      transition: background .15s ease, color .15s ease, transform .15s ease;
      white-space:nowrap;
    }

    .GigLink:hover{
      background:var(--purple);
      color:#fff;
      transform:translateY(-1px);
    }

    .GigTag{
      font-size:12px;
      font-weight:750;
      letter-spacing:.12em;
      text-transform:uppercase;
      color:rgba(14,17,22,.45);
      white-space:nowrap;
    }

    /* Past styling */
    .GigRow.is-past{
      opacity:.55;
      filter:saturate(.9);
    }
    .GigRow.is-past .GigLink{
      border-color:rgba(104,0,104,.55);
      color:rgba(104,0,104,.9);
    }

    .Empty{
      border:1px dashed rgba(10,16,26,.22);
      border-radius:var(--radius);
      padding:16px;
      color:var(--muted);
      background:rgba(10,16,26,.02);
      font-weight:400;
      margin-top:14px;
    }

    .SoftDivider{
      height:1px;
      width:100%;
      margin:30px 0 12px;
      border:0;
      background:linear-gradient(
        to right,
        rgba(10,16,26,0),
        rgba(10,16,26,.18),
        rgba(10,16,26,0)
      );
      opacity:.95;
    }

    /* Responsive */
    @media (max-width: 980px){
      .GigRow{
        grid-template-columns: 150px 1fr 130px;
        gap:16px;
      }
      .GigDate__day{ font-size:58px; min-width:68px; }
    }

    @media (max-width: 760px){
      .GigRow{
        grid-template-columns: 1fr;
        gap:10px;
        padding:18px 0;
      }

      .GigActions{
        justify-content:flex-start;
      }

      .GigDate__day{
        font-size:52px;
      }
      .GigDate__stack{
        padding-top:10px;
      }
    }
  </style>
</head>

<body>
  <div id="HeadbarSlot"></div>

  <main id="MainContent">
    <div class="Page">
      <header class="Page__head">
        <div>
          <h1 class="Page__title">Konzerte</h1>
          <div class="AccentRule"></div>
          <p class="Page__subtitle">
            Kommende und vergangene Live-Termine von Sandrine Neye.
          </p>
        </div>
      </header>

      <h2 class="SectionTitle">Kommende Konzerte</h2>
      <div id="UpcomingList" class="GigList" aria-live="polite"></div>

      <div class="SoftDivider" role="separator" aria-hidden="true"></div>

      <h2 class="SectionTitle">Vergangene Konzerte</h2>
      <div id="PastList" class="GigList" aria-live="polite"></div>

      <div id="LoadError" class="Empty" style="display:none;"></div>
    </div>
  </main>

  <div id="FootbarSlot"></div>
  <div id="CookieSlot"></div>

  <noscript>
    <div style="padding:16px; max-width:900px; margin:0 auto;">
      Diese Website benötigt JavaScript, um Navigation/Footer korrekt zu laden.
    </div>
  </noscript>

  <script>
    (function(){
      const upcomingEl = document.getElementById("UpcomingList");
      const pastEl = document.getElementById("PastList");
      const errEl = document.getElementById("LoadError");

      const ENDPOINT = "https://script.google.com/macros/s/AKfycbybqzLZWJ-B2k6T1qkaMpikRUKdNPuxUgOyu6YMC2zP-bJyF-oPd4_fR_WOEsZmO2PtUQ/exec";

      function esc(s){
        return String(s ?? "").replace(/[&<>"']/g, m => ({
          "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
        }[m]));
      }

      const MONTHS_DE = ["Jan","Feb","Mär","Apr","Mai","Jun","Jul","Aug","Sep","Okt","Nov","Dez"];

      function parseISO(iso){
        const m = /^(\d{4})-(\d{2})-(\d{2})$/.exec(String(iso||""));
        if(!m) return null;
        return { y:+m[1], mo:+m[2], d:+m[3] };
      }

      function dateParts(iso){
        const p = parseISO(iso);
        if(!p) return { day:"", mon:"", year:"" };
        const day = String(p.d).padStart(2,"0");
        const mon = MONTHS_DE[Math.max(0, Math.min(11, p.mo-1))];
        const year = String(p.y);
        return { day, mon, year };
      }

      function gigRow(g, isPast){
        const dp = dateParts(g.date);

        const title = esc(g.title || g.venue || "Konzert");
        const city = esc(g.city || "");
        const venue = esc(g.venue || "");
        const time = esc(g.time || "");

        const ticketUrl = g.tickets ? esc(g.tickets) : "";
        const infoUrl = g.url ? esc(g.url) : "";

        const metaParts = [];
        if(venue) metaParts.push(venue);
        if(city) metaParts.push(city);
        if(time) metaParts.push(time);

        const meta = metaParts.join(" · ");

        let actionHtml = "";
        if(ticketUrl){
          actionHtml = `<a class="GigLink" href="${ticketUrl}" target="_blank" rel="noopener">Tickets</a>`;
        }else if(infoUrl){
          actionHtml = `<a class="GigLink" href="${infoUrl}" target="_blank" rel="noopener">Tickets</a>`;
        }else{
          actionHtml = `<span class="GigTag">${isPast ? "Vergangen" : "Kommend"}</span>`;
        }

        return `
          <article class="GigRow ${isPast ? "is-past" : ""}">
            <div class="GigDate" aria-label="Datum">
              <div class="GigDate__day">${esc(dp.day)}</div>
              <div class="GigDate__stack">
                <div class="GigDate__month">${esc(dp.mon)}</div>
                <div class="GigDate__year">${esc(dp.year)}</div>
              </div>
            </div>

            <div class="GigMain">
              <h3 class="GigTitle">${title}</h3>
              <div class="GigMeta">
                ${esc(meta)}
                ${infoUrl ? ` <small>·</small> <a href="${infoUrl}" target="_blank" rel="noopener" style="color:inherit; text-decoration:underline; text-decoration-color:rgba(14,17,22,.25); text-underline-offset:3px;"></a>` : ""}
              </div>
            </div>

            <div class="GigActions">
              ${actionHtml}
            </div>
          </article>
        `;
      }

      function showEmpty(el, txt){
        el.innerHTML = `<div class="Empty">${esc(txt)}</div>`;
      }

      async function load(){
        const url = ENDPOINT + "?mode=split&days=365&max=250";

        try{
          const res = await fetch(url, { cache:"no-cache" });
          if(!res.ok) throw new Error("HTTP " + res.status);
          const data = await res.json();

          const upcoming = Array.isArray(data.upcoming) ? data.upcoming : [];
          const past = Array.isArray(data.past) ? data.past : [];

          if(upcoming.length === 0) showEmpty(upcomingEl, "Aktuell sind keine kommenden Konzerte eingetragen.");
          else upcomingEl.innerHTML = upcoming.map(g => gigRow(g, false)).join("");

          if(past.length === 0) showEmpty(pastEl, "Noch keine vergangenen Konzerte eingetragen.");
          else pastEl.innerHTML = past.map(g => gigRow(g, true)).join("");

          errEl.style.display = "none";
          errEl.textContent = "";
        }catch(e){
          console.warn(e);
          errEl.style.display = "block";
          errEl.innerHTML = `<strong>Konzerte konnten nicht geladen werden.</strong><br>${esc(String(e))}`;
          showEmpty(upcomingEl, "—");
          showEmpty(pastEl, "—");
        }
      }

      load();
    })();
  </script>
</body>
</html>
