<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <base href="./">

  <title>Galerie – Sandrine Neye</title>
  <meta name="description" content="Galerie von Sandrine Neye." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <link rel="icon" href="../Resources/Content/Favicon.ico" />
  <link rel="stylesheet" href="../style.css" />
  <script defer src="../Scripts/includes.js"></script>
  <script defer src="../Scripts/main.js"></script>

  <style>
    html, body{
      margin:0;
      padding:0;
      font-family:"Outfit", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background:#fff;
      color:#0e1116;
    }

    :root{
      --container:1120px;
      --muted:rgba(14,17,22,.7);
      --hbH:74px;

      /* 0 = wirklich keine Luft zwischen Bildern */
      --gap:0px;

      /* wenn du minimal “Premium-Luft” willst: 6px oder 8px */
      /* --gap:8px; */
    }

    #MainContent{
      min-height: calc(100vh - var(--hbH));
      display:flex;
      flex-direction:column;
      width:100%;
    }

    .Page{
      flex:1;
      width:100%;
      max-width:var(--container);
      margin:0 auto;
      padding:42px 18px 70px;
      box-sizing:border-box;
    }

    .Page__head{
      width:100%;
      text-align:left;
      margin-bottom:6px;
    }

    .Page__title{
      margin:0;
      font-size:clamp(32px, 4.2vw, 52px);
      font-weight:300;
      letter-spacing:0.004em;
      line-height:1.05;
    }

    .AccentRule{
      height:3px;
      width:56px;
      background:var(--purple);
      border-radius:2px;
      margin:14px 0 0;
      opacity:.9;
    }

    .Count{
      margin-top:18px;
      font-weight:500;
      color:var(--muted);
      font-size:14px;
      text-align:left;
      letter-spacing:.04em;
    }

    .Empty{
      width:100%;
      max-width:760px;
      margin:16px 0 0;
      border:1px dashed rgba(10,16,26,.22);
      border-radius:14px;
      padding:16px 18px;
      color:var(--muted);
      box-sizing:border-box;
      text-align:left;
      font-weight:400;
    }

    /* =========================================================
       REAL MASONRY (CSS COLUMNS) – practically gapless
       ========================================================= */
    .Grid{
      width:100%;
      margin-top:22px;

      column-count:4;
      column-gap:var(--gap);

      /* remove any line-height gaps */
      font-size:0;
      line-height:0;
    }

    .Tile{
      display:block;
      width:100%;
      margin:0 0 var(--gap);

      /* critical: avoid split across columns */
      break-inside:avoid;
      -webkit-column-break-inside:avoid;
      page-break-inside:avoid;

      cursor:pointer;
      background:transparent;

      /* no borders, no padding -> no gaps */
      border:0;
      border-radius:0;
      overflow:hidden;

      /* tiny hover, but NO layout jump */
      transition: filter .15s ease, transform .15s ease;
      will-change: transform;
    }

    .Tile:hover{
      filter:brightness(1.02);
      transform:translateY(-1px);
    }

    .Tile img{
      width:100%;
      height:auto;
      display:block;

      /* no whitespace */
      margin:0;
      padding:0;
    }

    @media (max-width:1000px){
      .Grid{ column-count:3; }
    }
    @media (max-width:700px){
      .Grid{ column-count:2; }
    }
    @media (max-width:450px){
      .Grid{ column-count:1; }
    }

    /* =========================================================
       Lightbox
       ========================================================= */
    .Lightbox{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.88);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:9999;
      padding:20px;
    }
    .Lightbox.is-open{ display:flex; }

    .Lightbox__wrap{
      position:relative;
      max-width:96vw;
      max-height:90vh;
    }

    .Lightbox img{
      display:block;
      max-width:96vw;
      max-height:90vh;
      border-radius:12px;
      background:rgba(255,255,255,.06);
      object-fit:contain;
    }

    .Lightbox__loading{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      color:#fff;
      font-weight:600;
      letter-spacing:.04em;
      text-shadow:0 8px 20px rgba(0,0,0,.35);
      pointer-events:none;
      font-size:16px;
      line-height:normal;
    }
    .Lightbox.is-loading .Lightbox__loading{ display:flex; }

    .Lightbox__error{
      position:absolute;
      left:0;
      right:0;
      bottom:-38px;
      color:rgba(255,255,255,.82);
      font-size:13px;
      font-weight:500;
      letter-spacing:.02em;
      text-align:center;
      display:none;
      line-height:normal;
    }
    .Lightbox.has-error .Lightbox__error{ display:block; }

    .Lightbox button{
      position:fixed;
      top:20px;
      right:20px;
      padding:10px 14px;
      border-radius:10px;
      border:2px solid #fff;
      background:transparent;
      color:#fff;
      font-weight:600;
      letter-spacing:.04em;
      cursor:pointer;
      font-size:14px;
      line-height:normal;
    }
  </style>
</head>

<body>
  <div id="HeadbarSlot"></div>

  <main id="MainContent">
    <div class="Page">

      <header class="Page__head">
        <h1 class="Page__title">Galerie</h1>
        <div class="AccentRule"></div>
        <div class="Count" id="Count">Lade Bilder…</div>
      </header>

      <div id="Error" class="Empty" style="display:none;"></div>
      <div id="Grid" class="Grid"></div>

    </div>
  </main>

  <div id="FootbarSlot"></div>
  <div id="CookieSlot"></div>

  <div class="Lightbox" id="Lightbox" aria-hidden="true">
    <button id="LbClose" type="button">Schließen</button>

    <div class="Lightbox__wrap">
      <div class="Lightbox__loading">Lade Bild…</div>
      <img id="LbImg" alt="">
      <div class="Lightbox__error" id="LbErr"></div>
    </div>
  </div>

  <script>
  (function(){
    "use strict";

    const ENDPOINT = "https://script.google.com/macros/s/AKfycbx41vfB3zcZ2sPY8EIb6rqT6mEfxvNLtcU0Xb1UInRGPe9EoR2HqmjwjkPO7LeeeHATSQ/exec";

    const grid = document.getElementById("Grid");
    const err  = document.getElementById("Error");
    const cnt  = document.getElementById("Count");

    const lb = document.getElementById("Lightbox");
    const lbImg = document.getElementById("LbImg");
    const lbClose = document.getElementById("LbClose");
    const lbErr = document.getElementById("LbErr");

    function escHtml(s){
      return String(s ?? "").replace(/[&<>"']/g, m => ({
        "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"
      }[m]));
    }

    function escAttr(s){
      return String(s ?? "").replace(/"/g, "&quot;");
    }

    function toDirectImageUrl(url){
      const u = String(url || "").trim();
      if(!u) return "";
      const fixed = u.replaceAll("&amp;", "&");

      if(fixed.includes("drive.google.com/uc?") || fixed.match(/\.(jpg|jpeg|png|webp|gif)(\?|#|$)/i)){
        return fixed;
      }

      let m = fixed.match(/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/);
      if(m && m[1]) return "https://drive.google.com/uc?export=view&id=" + m[1];

      m = fixed.match(/[?&]id=([a-zA-Z0-9_-]+)/);
      if(m && m[1]) return "https://drive.google.com/uc?export=view&id=" + m[1];

      m = fixed.match(/drive\.google\.com\/uc\?id=([a-zA-Z0-9_-]+)/);
      if(m && m[1]) return "https://drive.google.com/uc?export=view&id=" + m[1];

      return fixed;
    }

    function openLb(fullUrl, thumbUrl){
      lb.classList.add("is-open", "is-loading");
      lb.classList.remove("has-error");
      lbErr.textContent = "";
      lb.setAttribute("aria-hidden","false");
      document.body.style.overflow = "hidden";

      lbImg.removeAttribute("src");
      lbImg.removeAttribute("srcset");

      const direct = toDirectImageUrl(fullUrl);

      const onLoad = () => {
        lb.classList.remove("is-loading");
        lbImg.removeEventListener("load", onLoad);
        lbImg.removeEventListener("error", onErr);
      };

      const onErr = () => {
        if(thumbUrl && lbImg.src !== thumbUrl){
          lbImg.src = thumbUrl;
          lb.classList.add("has-error");
          lb.classList.remove("is-loading");
          return;
        }
        lb.classList.remove("is-loading");
        lb.classList.add("has-error");
        lbErr.textContent = " (Link ist vermutlich kein Direktbild / Drive-Freigabe)";
        lbImg.removeEventListener("load", onLoad);
        lbImg.removeEventListener("error", onErr);
      };

      lbImg.addEventListener("load", onLoad);
      lbImg.addEventListener("error", onErr);

      const cacheBust = (direct.includes("?") ? "&" : "?") + "v=" + Date.now();
      lbImg.src = direct + cacheBust;
    }

    function closeLb(){
      lb.classList.remove("is-open", "is-loading", "has-error");
      lb.setAttribute("aria-hidden","true");
      lbImg.removeAttribute("src");
      document.body.style.overflow = "";
    }

    lbClose.addEventListener("click", closeLb);
    lb.addEventListener("click", e => { if(e.target === lb) closeLb(); });
    document.addEventListener("keydown", e => { if(e.key === "Escape") closeLb(); });

    function showError(msg){
      err.style.display = "block";
      err.innerHTML = msg;
    }

    async function load(){
      err.style.display = "none";
      err.textContent = "";
      grid.innerHTML = "";
      cnt.textContent = "Lade Bilder…";

      try{
        const res = await fetch(ENDPOINT + "?max=150", { cache:"no-cache" });
        if(!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();

        const items = Array.isArray(data.items) ? data.items : [];

        if(items.length === 0){
          cnt.textContent = "0 Bilder";
          showError("Keine Bilder gefunden. (Ordner leer oder Freigabe/Script prüfen)");
          return;
        }

        cnt.textContent = items.length + " Bilder";

        grid.innerHTML = items.map(item => `
          <div class="Tile"
               data-full="${escAttr(item.full)}"
               data-thumb="${escAttr(item.thumb)}"
               aria-label="${escHtml(item.name)}">
            <img src="${escAttr(item.thumb)}" alt="${escHtml(item.name)}" loading="lazy" decoding="async">
          </div>
        `).join("");

        grid.addEventListener("click", (e) => {
          const tile = e.target.closest(".Tile");
          if(!tile) return;

          const full = (tile.dataset.full || "").replaceAll("&amp;", "&");
          const thumb = (tile.dataset.thumb || "").replaceAll("&amp;", "&");
          openLb(full, thumb);
        });

      }catch(e){
        console.warn(e);
        cnt.textContent = "—";
        showError("Bilder konnten nicht geladen werden. Bitte Endpoint / Freigabe prüfen.");
      }
    }

    load();
  })();
  </script>

</body>
</html>
